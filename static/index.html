<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Universal Web-to-API Dashboard</title>

    <!-- 外部依赖 -->

    <!-- Tailwind 配置 -->

    <!-- 自定义样式 -->
    <link rel="stylesheet" href="/static/css/dashboard.css?v=2.6.9">

    <!-- 图标定义 -->
</head>
<body class="bg-gray-50 dark:bg-gray-900 transition-colors duration-300 h-screen overflow-hidden">
    <div id="app-shell" class="app-shell" style="position:fixed;inset:0;display:flex;align-items:center;justify-content:center;padding:24px;background:radial-gradient(circle at top, rgba(59,130,246,.16), transparent 38%), linear-gradient(180deg, #111827 0%, #0f172a 100%);z-index:9999;">
        <div class="app-shell-card" style="width:min(480px,100%);padding:28px;border:1px solid rgba(148,163,184,.24);border-radius:18px;background:rgba(15,23,42,.88);box-shadow:0 20px 50px rgba(0,0,0,.35);color:#e5eefc;text-align:center;">
            <div class="app-shell-title">控制面板加载中</div>
            <p class="app-shell-text">正在加载前端资源和配置。如果停留太久，通常是外部 CDN 响应慢。</p>
            <button type="button" class="app-shell-button" onclick="window.location.reload()">重新加载</button>
        </div>
    </div>
    <div id="app" class="flex h-full overflow-hidden" v-cloak @click="closeAllMenus">

        <!-- 隐藏的文件输入框 -->
        <input type="file" ref="importFileInput" accept=".json" class="hidden" @change="handleImportFile">
        <input type="file" ref="backupImportInput" accept=".json" class="hidden" @change="handleSettingsBackupImportFile">

        <!-- Toast 通知 -->
        <div class="fixed top-4 right-4 z-50 max-w-sm">
            <div v-for="toast in toasts"
                 :key="toast.id"
                 :class="['px-4 py-2 rounded shadow-lg text-white mb-2 transition-opacity duration-300',
                          {'bg-green-500': toast.type === 'success',
                           'bg-red-500': toast.type === 'error',
                           'bg-blue-500': toast.type === 'info',
                           'bg-yellow-500': toast.type === 'warning'}]"
                 @click="removeToast(toast.id)">
                {{ toast.message }}
            </div>
        </div>

        <!-- 左侧栏组件 -->
        <sidebar-component :sites="sites"
                           :current-domain="currentDomain"
                           :browser-status="browserStatus"
                           :auth-enabled="authEnabled"
                           :has-token="hasToken"
                           :dark-mode="darkMode"
                           :active-tab="activeTab"
                           @select-site="selectSite"
                           @add-site="addNewSite"
                           @delete-site="confirmDelete"
                           @export-site="exportSingleSite"
                           @toggle-dark="toggleDarkMode"
                           @refresh-status="refreshStatus"
                           @trigger-import="triggerImport"
                           @export-all="exportConfig"
                           @show-token-dialog="showTokenDialog = true"
                           @change-tab="changeTab">
        </sidebar-component>

        <!-- 主内容区 -->
        <main class="flex-1 flex flex-col overflow-x-hidden overflow-y-auto bg-gray-50 dark:bg-gray-900">

            <!-- 头部（配置/日志 Tab） -->
            <header v-if="activeTab === 'marketplace'"
                    class="bg-white dark:bg-gray-800 border-b dark:border-gray-700 p-4">
                <div class="flex justify-between items-center gap-4">
                    <div class="flex items-center gap-3">
                        <span v-html="$icons.shoppingBag" class="text-gray-600 dark:text-gray-400"></span>
                        <div>
                            <h2 class="text-xl font-bold dark:text-white">插件市场</h2>
                            <p class="text-sm text-gray-500 dark:text-gray-400">站点配置和命令系统都支持预览与导入</p>
                        </div>
                    </div>
                    <div class="flex gap-2">
                        <button @click="loadMarketplaceCatalog({ force: true })"
                                class="border dark:border-gray-700 rounded hover:bg-gray-100 dark:hover:bg-gray-700 dark:text-white transition-colors px-2 py-0.5 text-sm">
                            <span v-html="$icons.arrowPath"></span> 刷新市场
                        </button>
                        <button @click="openMarketplaceSubmitDialog"
                                class="border dark:border-gray-700 rounded hover:bg-gray-100 dark:hover:bg-gray-700 dark:text-white transition-colors px-2 py-0.5 text-sm">
                            <span v-html="$icons.arrowUpTray"></span> 投稿上传
                        </button>
                    </div>
                </div>
            </header>

            <header v-if="activeTab !== 'settings' && activeTab !== 'marketplace' && currentDomain && currentConfig"
                    class="bg-white dark:bg-gray-800 border-b dark:border-gray-700 p-4">
                <div class="flex justify-between items-center">
                    <div class="flex items-center gap-4">
                        <h2 class="text-xl font-bold dark:text-white">{{ currentDomain }}</h2>
                        <label v-if="getActivePresetConfig()" class="flex items-center text-sm cursor-pointer dark:text-gray-300">
                            <input type="checkbox"
                                   :checked="getActivePresetConfig().stealth"
                                   @change="getActivePresetConfig().stealth = $event.target.checked"
                                   class="mr-2">
                            <span>隐身模式</span>
                        </label>
                    </div>
                    <div class="flex gap-2">
                        <button @click="refreshStatus"
                                class="border dark:border-gray-700 rounded hover:bg-gray-100 dark:hover:bg-gray-700 dark:text-white transition-colors px-2 py-0.5 text-sm">
                            <span v-html="$icons.arrowPath"></span> 刷新
                        </button>
                        <button @click="showJsonPreview = true"
                                class="border dark:border-gray-700 rounded hover:bg-gray-100 dark:hover:bg-gray-700 dark:text-white transition-colors px-2 py-0.5 text-sm">
                            查看 JSON
                        </button>
                        <button @click="exportCurrentSite"
                                class="border dark:border-gray-700 rounded hover:bg-gray-100 dark:hover:bg-gray-700 dark:text-white transition-colors px-2 py-0.5 text-sm">
                            <span v-html="$icons.arrowUpTray"></span> 导出站点
                        </button>
                        <button @click="reanalyzeCurrentSite"
                                class="border dark:border-gray-700 rounded hover:bg-gray-100 dark:hover:bg-gray-700 dark:text-white transition-colors px-2 py-0.5 text-sm">
                            重新分析
                        </button>
                        <button @click="saveConfig"
                                :disabled="isSaving"
                                :class="['border rounded transition-colors px-2 py-0.5 text-sm',
                                         isSaving ? 'opacity-50 cursor-not-allowed px-3 py-1 hover:bg-gray-100 dark:text-gray-400'
                                                  : 'bg-blue-500 text-white hover:bg-blue-600 border-blue-500']">
                            <span v-if="!isSaving" v-html="$icons.arrowDownTray"></span>
                            {{ isSaving ? '保存中...' : ' 保存' }}
                        </button>
                    </div>
                </div>
            </header>

            <!-- 设置页头部 -->
            <header v-if="activeTab === 'settings'"
                    class="bg-white dark:bg-gray-800 border-b dark:border-gray-700 p-4">
                <div class="flex justify-between items-center">
                    <div class="flex items-center gap-3">
                        <span v-html="$icons.cog" class="text-gray-600 dark:text-gray-400"></span>
                        <h2 class="text-xl font-bold dark:text-white">系统设置</h2>
                    </div>
                    <div class="flex gap-2">
                        <button @click="triggerSettingsBackupImport"
                                class="border dark:border-gray-700 rounded hover:bg-gray-100 dark:hover:bg-gray-700 dark:text-white transition-colors px-2 py-0.5 text-sm">
                            <span v-html="$icons.documentArrowDown"></span> 完整导入
                        </button>
                        <button @click="exportSettingsBackup"
                                class="border dark:border-gray-700 rounded hover:bg-gray-100 dark:hover:bg-gray-700 dark:text-white transition-colors px-2 py-0.5 text-sm">
                            <span v-html="$icons.arrowUpTray"></span> 完整导出
                        </button>
                        <button @click="loadEnvConfig(); loadBrowserConstants(); loadUpdatePreserveSettings(); loadSelectorDefinitions()"
                                class="border dark:border-gray-700 rounded hover:bg-gray-100 dark:hover:bg-gray-700 dark:text-white transition-colors px-2 py-0.5 text-sm">
                            <span v-html="$icons.arrowPath"></span> 刷新
                        </button>
                    </div>
                </div>
            </header>

            <!-- Tab 切换栏 -->
            <div class="bg-white dark:bg-gray-800 border-b dark:border-gray-700 px-4 flex flex-wrap items-center gap-2">
                <button @click="activeTab = 'config'"
                        :class="['px-4 py-2 text-sm font-medium border-b-2 transition-colors',
                                 activeTab === 'config'
                                 ? 'border-blue-500 text-blue-600 dark:text-blue-400'
                                 : 'border-transparent text-gray-500 dark:text-gray-400 hover:text-gray-700 dark:hover:text-gray-300']">
                    <span v-html="$icons.clipboardList"></span> 配置
                </button>
                <button @click="activeTab = 'tabpool'"
                        :class="['px-4 py-2 text-sm font-medium border-b-2 transition-colors',
                                 activeTab === 'tabpool'
                                 ? 'border-blue-500 text-blue-600 dark:text-blue-400'
                                 : 'border-transparent text-gray-500 dark:text-gray-400 hover:text-gray-700 dark:hover:text-gray-300']">
                    🗂️ 标签页
                </button>
                <button @click="activeTab = 'logs'"
                        :class="['px-4 py-2 text-sm font-medium border-b-2 transition-colors',
                                 activeTab === 'logs'
                                 ? 'border-blue-500 text-blue-600 dark:text-blue-400'
                                 : 'border-transparent text-gray-500 dark:text-gray-400 hover:text-gray-700 dark:hover:text-gray-300']">
                    <span v-html="$icons.chartBar"></span> 日志
                    <span v-if="logs.length > 0" class="ml-1 px-1.5 py-0.5 text-xs bg-blue-100 dark:bg-blue-900 text-blue-600 dark:text-blue-300 rounded-full">{{ logs.length }}</span>
                </button>
                <button @click="activeTab = 'commands'"
                        :class="['px-4 py-2 text-sm font-medium border-b-2 transition-colors',
                                 activeTab === 'commands'
                                 ? 'border-blue-500 text-blue-600 dark:text-blue-400'
                                 : 'border-transparent text-gray-500 dark:text-gray-400 hover:text-gray-700 dark:hover:text-gray-300']">
                    ⚡ 命令
                </button>
                <button @click="activeTab = 'settings'"
                        :class="['px-4 py-2 text-sm font-medium border-b-2 transition-colors',
                                 activeTab === 'settings'
                                 ? 'border-blue-500 text-blue-600 dark:text-blue-400'
                                 : 'border-transparent text-gray-500 dark:text-gray-400 hover:text-gray-700 dark:hover:text-gray-300']">
                    <span v-html="$icons.cog"></span> 设置
                    <span v-if="envConfigChanged || browserConstantsChanged || updatePreserveChanged || selectorDefinitionsChanged"
                          class="ml-1 w-2 h-2 bg-orange-500 rounded-full inline-block"></span>
                </button>
                <button @click="openMarketplace"
                        :class="['marketplace-entry-button', 'ml-auto']">
                    <span v-html="$icons.shoppingBag"></span>
                    插件市场
                </button>
            </div>
            <div class="flex-1 overflow-y-auto">
                <!-- Tab 内容区 -->
                <config-tab ref="configTab"
                            v-if="activeTab === 'config'"
                            :current-domain="currentDomain"
                            :current-config="currentConfig"
                            @add-selector="addSelector"
                            @remove-selector="removeSelector"
                            @update-selector-key="updateSelectorKey"
                            @test-selector="testSelector"
                            @add-step="addStep"
                            @remove-step="removeStep"
                            @move-step="moveStep"
                            @action-change="onActionChange"
                            @show-templates="showTemplates"
                            @update-image-config="updateImageConfig"
                            @test-image-extraction="testImageExtraction"
                            @reload-config="reloadConfig">
                </config-tab>

                <marketplace-tab v-show="activeTab === 'marketplace'"
                                 :catalog="marketplaceCatalog"
                                 :loading="marketplaceLoading"
                                 :error="marketplaceError"
                                 :importing-id="marketplaceImportingId"
                                 @refresh="loadMarketplaceCatalog({ force: true })"
                                 @preview-item="previewMarketplaceItem"
                                 @import-item="startMarketplaceImport"
                                 @open-submit="openMarketplaceSubmitDialog"
                                 @open-link="openExternalLink">
                </marketplace-tab>

                <!-- 标签页池 Tab -->
                <tabpool-tab v-show="activeTab === 'tabpool'"
                             :dark-mode="darkMode"
                             @notify="notify($event.message, $event.type)">
                </tabpool-tab>

                <!-- 命令 Tab -->
                <commands-tab v-show="activeTab === 'commands'"
                              :dark-mode="darkMode"
                              @notify="notify($event.message, $event.type)">
                </commands-tab>
                <!-- 日志 Tab -->
                <logs-tab v-show="activeTab === 'logs'"
                          :logs="logs"
                          :filter="logLevelFilter"
                          :paused="pauseLogs"
                          @clear="clearLogs"
                          @change-filter="logLevelFilter = $event"
                          @toggle-pause="pauseLogs = !pauseLogs">
                </logs-tab>

                <!-- 设置 Tab -->
                <settings-tab v-show="activeTab === 'settings'"
                              :env-config="envConfig"
                              :env-schema="envSchema"
                              :env-collapsed="envCollapsed"
                              :env-changed="envConfigChanged"
                              :saving-env="isSavingEnv"
                              :browser-constants="browserConstants"
                              :browser-schema="browserConstantsSchema"
                              :browser-collapsed="browserConstantsCollapsed"
                              :browser-changed="browserConstantsChanged"
                              :saving-browser="isSavingConstants"
                              :update-preserve-options="updatePreserveOptions"
                              :update-preserve-selected="updatePreserveSelected"
                              :update-preserve-changed="updatePreserveChanged"
                              :saving-update-preserve="isSavingUpdatePreserve"
                              :selector-definitions="selectorDefinitions"
                              :definitions-changed="selectorDefinitionsChanged"
                              :saving-definitions="isSavingDefinitions"
                              @save-env="saveEnvConfig"
                              @reset-env="resetEnvConfig"
                              @toggle-env-group="envCollapsed[$event] = !envCollapsed[$event]"
                              @save-browser="saveBrowserConstants"
                              @reset-browser="resetBrowserConstants"
                              @toggle-browser-group="browserConstantsCollapsed[$event] = !browserConstantsCollapsed[$event]"
                              @save-update-preserve="saveUpdatePreserveSettings"
                              @reset-update-preserve="resetUpdatePreserveSettings"
                              @toggle-update-preserve="toggleUpdatePreserve"
                              @save-definitions="saveSelectorDefinitions"
                              @reset-definitions="resetSelectorDefinitions"
                              @add-definition="openAddDefinitionDialog"
                              @edit-definition="openEditDefinitionDialog"
                              @remove-definition="removeDefinition"
                              @toggle-definition="toggleDefinitionEnabled"
                              @move-definition="moveDefinition">
                </settings-tab>
            </div>
        </main>

        <!-- 弹窗区域 -->
        <json-preview-dialog :show="showJsonPreview"
                             :json-data="getJsonPreviewData()"
                             :title="'配置 JSON · ' + getActivePresetName()"
                             @close="showJsonPreview = false"
                             @copy="copyJson"
                             @save="saveJsonPreview">
        </json-preview-dialog>

        <token-dialog :show="showTokenDialog"
                      v-model="tempToken"
                      @close="showTokenDialog = false"
                      @save="saveToken">
        </token-dialog>

        <step-templates-dialog :show="showStepTemplates"
                               @close="showStepTemplates = false"
                               @apply="applyTemplate($event); showStepTemplates = false">
        </step-templates-dialog>

        <test-dialog :show="showTestDialog"
                     :selector="testSelectorInput"
                     :timeout-value="testTimeout"
                     :highlight-enabled="testHighlight"
                     :result="testResult"
                     :testing="isTesting"
                     @close="showTestDialog = false"
                     @test="testSelectorInput = $event.selector; testTimeout = $event.timeout; testHighlight = $event.highlight; runTest()">
        </test-dialog>

        <import-dialog :show="showImportDialog"
                       :file-name="importFileName"
                       :import-type="importType"
                       :suggested-domain="singleSiteImportDomain"
                       :imported-config="importedConfig"
                       @close="cancelImport"
                       @confirm="singleSiteImportDomain = $event.domain; importMode = $event.mode; executeImport()">
        </import-dialog>

        <definition-dialog :show="showAddDefinitionDialog"
                           :edit-index="editingDefinitionIndex"
                           :definition="newDefinition"
                           @close="showAddDefinitionDialog = false"
                           @save="saveDefinition">
        </definition-dialog>

        <json-preview-dialog :show="showMarketplacePreview"
                             :json-data="marketplacePreviewData || {}"
                             :title="marketplacePreviewTitle || '市场预览'"
                             @close="showMarketplacePreview = false"
                             @copy="copyMarketplacePreview"
                             @save="saveMarketplacePreview">
        </json-preview-dialog>

        <div v-if="showMarketplaceImportDialog"
             class="fixed inset-0 z-50 flex items-center justify-center bg-slate-950/60 p-4 backdrop-blur-sm">
            <div class="w-full max-w-2xl rounded-2xl border border-slate-200 bg-white shadow-2xl dark:border-slate-700 dark:bg-slate-900">
                <div class="flex items-center justify-between border-b border-slate-200 px-6 py-4 dark:border-slate-700">
                    <div>
                        <h3 class="text-lg font-bold text-slate-900 dark:text-white">导入站点配置</h3>
                        <p class="mt-1 text-sm text-slate-500 dark:text-slate-400">可以直接覆盖站点，也可以另存为新的预设。</p>
                    </div>
                    <button @click="showMarketplaceImportDialog = false"
                            class="rounded-lg px-2 py-1 text-slate-500 transition hover:bg-slate-100 dark:hover:bg-slate-800">
                        关闭
                    </button>
                </div>
                <div class="space-y-4 px-6 py-5">
                    <label class="flex items-start gap-3 rounded-xl border border-slate-200 p-4 dark:border-slate-700">
                        <input type="radio" value="overwrite" v-model="marketplaceImportStrategy" class="mt-1">
                        <div>
                            <div class="font-semibold text-slate-900 dark:text-white">覆盖站点配置</div>
                            <p class="mt-1 text-sm text-slate-500 dark:text-slate-400">直接用市场中的配置替换该站点当前配置。</p>
                        </div>
                    </label>
                    <label class="flex items-start gap-3 rounded-xl border border-slate-200 p-4 dark:border-slate-700">
                        <input type="radio" value="save_as_preset" v-model="marketplaceImportStrategy" class="mt-1">
                        <div class="flex-1">
                            <div class="font-semibold text-slate-900 dark:text-white">另存为预设</div>
                            <p class="mt-1 text-sm text-slate-500 dark:text-slate-400">保留当前站点配置，只把导入内容保存为新的预设。</p>
                            <input v-if="marketplaceImportStrategy === 'save_as_preset'"
                                   v-model.trim="marketplaceImportPresetName"
                                   type="text"
                                   placeholder="输入新的预设名称"
                                   class="mt-3 w-full rounded-xl border border-slate-200 bg-white px-3 py-2 text-sm text-slate-700 dark:border-slate-700 dark:bg-slate-950 dark:text-slate-200">
                        </div>
                    </label>
                </div>
                <div class="flex justify-end gap-3 border-t border-slate-200 px-6 py-4 dark:border-slate-700">
                    <button @click="showMarketplaceImportDialog = false"
                            class="rounded-xl border border-slate-200 px-4 py-2 text-sm font-medium text-slate-600 transition hover:bg-slate-100 dark:border-slate-700 dark:text-slate-300 dark:hover:bg-slate-800">
                        取消
                    </button>
                    <button @click="confirmMarketplaceImport"
                            class="rounded-xl bg-blue-600 px-4 py-2 text-sm font-semibold text-white transition hover:bg-blue-700">
                        确认导入
                    </button>
                </div>
            </div>
        </div>

        <div v-if="showMarketplaceSubmitDialog"
             class="fixed inset-0 z-50 flex items-center justify-center bg-slate-950/60 p-4 backdrop-blur-sm">
            <div class="w-full max-w-6xl rounded-2xl border border-slate-200 bg-white shadow-2xl dark:border-slate-700 dark:bg-slate-900">
                <div class="flex items-center justify-between border-b border-slate-200 px-6 py-4 dark:border-slate-700">
                    <div>
                        <h3 class="text-lg font-bold text-slate-900 dark:text-white">投稿到插件市场</h3>
                        <p class="mt-1 text-sm text-slate-500 dark:text-slate-400">上传时需要标题、简介，并且会实时生成预览供他人查看。</p>
                    </div>
                    <button @click="showMarketplaceSubmitDialog = false"
                            class="rounded-lg px-2 py-1 text-slate-500 transition hover:bg-slate-100 dark:hover:bg-slate-800">
                        关闭
                    </button>
                </div>
                <div class="grid gap-6 px-6 py-5 lg:grid-cols-[minmax(0,1fr)_minmax(0,1fr)]">
                    <div class="space-y-4">
                        <div class="grid gap-3 sm:grid-cols-2">
                            <button @click="setMarketplaceSubmitType('site_config')"
                                    :class="['rounded-xl border px-4 py-3 text-left transition',
                                             marketplaceSubmitForm.item_type === 'site_config'
                                             ? 'border-blue-500 bg-blue-50 text-blue-700 dark:bg-blue-900/20 dark:text-blue-300'
                                             : 'border-slate-200 text-slate-600 hover:bg-slate-50 dark:border-slate-700 dark:text-slate-300 dark:hover:bg-slate-800']">
                                <div class="font-semibold">站点配置</div>
                                <div class="mt-1 text-sm opacity-80">上传当前站点预设，并按站点域名归类。</div>
                            </button>
                            <button @click="setMarketplaceSubmitType('command_bundle')"
                                    :class="['rounded-xl border px-4 py-3 text-left transition',
                                             marketplaceSubmitForm.item_type === 'command_bundle'
                                             ? 'border-blue-500 bg-blue-50 text-blue-700 dark:bg-blue-900/20 dark:text-blue-300'
                                             : 'border-slate-200 text-slate-600 hover:bg-slate-50 dark:border-slate-700 dark:text-slate-300 dark:hover:bg-slate-800']">
                                <div class="font-semibold">命令系统</div>
                                <div class="mt-1 text-sm opacity-80">选择一个或多个命令，打包成命令系统投稿。</div>
                            </button>
                        </div>

                        <div class="grid gap-4 sm:grid-cols-2">
                            <label class="block">
                                <div class="mb-1 text-sm font-medium text-slate-700 dark:text-slate-200">标题</div>
                                <input v-model.trim="marketplaceSubmitForm.title"
                                       type="text"
                                       class="w-full rounded-xl border border-slate-200 bg-white px-3 py-2 text-sm text-slate-700 dark:border-slate-700 dark:bg-slate-950 dark:text-slate-200">
                            </label>
                            <label class="block">
                                <div class="mb-1 text-sm font-medium text-slate-700 dark:text-slate-200">作者</div>
                                <input v-model.trim="marketplaceSubmitForm.author"
                                       type="text"
                                       class="w-full rounded-xl border border-slate-200 bg-white px-3 py-2 text-sm text-slate-700 dark:border-slate-700 dark:bg-slate-950 dark:text-slate-200">
                            </label>
                        </div>

                        <label class="block">
                            <div class="mb-1 text-sm font-medium text-slate-700 dark:text-slate-200">简介</div>
                            <textarea v-model.trim="marketplaceSubmitForm.summary"
                                      rows="3"
                                      class="w-full rounded-xl border border-slate-200 bg-white px-3 py-2 text-sm text-slate-700 dark:border-slate-700 dark:bg-slate-950 dark:text-slate-200"></textarea>
                        </label>

                        <div class="grid gap-4 sm:grid-cols-2">
                            <label v-if="marketplaceSubmitForm.item_type === 'site_config'" class="block">
                                <div class="mb-1 text-sm font-medium text-slate-700 dark:text-slate-200">站点域名</div>
                                <input v-model.trim="marketplaceSubmitForm.site_domain"
                                       type="text"
                                       placeholder="例如 chatgpt.com"
                                       class="w-full rounded-xl border border-slate-200 bg-white px-3 py-2 text-sm text-slate-700 dark:border-slate-700 dark:bg-slate-950 dark:text-slate-200">
                            </label>
                            <label class="block">
                                <div class="mb-1 text-sm font-medium text-slate-700 dark:text-slate-200">分类</div>
                                <input v-model.trim="marketplaceSubmitForm.category"
                                       type="text"
                                       :placeholder="marketplaceSubmitForm.item_type === 'site_config' ? '默认使用站点域名分类' : '默认命令系统'"
                                       class="w-full rounded-xl border border-slate-200 bg-white px-3 py-2 text-sm text-slate-700 dark:border-slate-700 dark:bg-slate-950 dark:text-slate-200">
                            </label>
                        </div>

                        <div class="grid gap-4 sm:grid-cols-3">
                            <label v-if="marketplaceSubmitForm.item_type === 'site_config'" class="block">
                                <div class="mb-1 text-sm font-medium text-slate-700 dark:text-slate-200">预设名</div>
                                <input v-model.trim="marketplaceSubmitForm.preset_name"
                                       type="text"
                                       class="w-full rounded-xl border border-slate-200 bg-white px-3 py-2 text-sm text-slate-700 dark:border-slate-700 dark:bg-slate-950 dark:text-slate-200">
                            </label>
                            <label class="block">
                                <div class="mb-1 text-sm font-medium text-slate-700 dark:text-slate-200">版本</div>
                                <input v-model.trim="marketplaceSubmitForm.version"
                                       type="text"
                                       class="w-full rounded-xl border border-slate-200 bg-white px-3 py-2 text-sm text-slate-700 dark:border-slate-700 dark:bg-slate-950 dark:text-slate-200">
                            </label>
                            <label class="block">
                                <div class="mb-1 text-sm font-medium text-slate-700 dark:text-slate-200">兼容说明</div>
                                <input v-model.trim="marketplaceSubmitForm.compatibility"
                                       type="text"
                                       placeholder="例如 2.6.x"
                                       class="w-full rounded-xl border border-slate-200 bg-white px-3 py-2 text-sm text-slate-700 dark:border-slate-700 dark:bg-slate-950 dark:text-slate-200">
                            </label>
                        </div>

                        <label class="block">
                            <div class="mb-1 text-sm font-medium text-slate-700 dark:text-slate-200">标签</div>
                            <input v-model.trim="marketplaceSubmitForm.tagsText"
                                   type="text"
                                   placeholder="用逗号分隔，例如 稳定, 中文, 长输出"
                                   class="w-full rounded-xl border border-slate-200 bg-white px-3 py-2 text-sm text-slate-700 dark:border-slate-700 dark:bg-slate-950 dark:text-slate-200">
                        </label>

                        <div v-if="marketplaceSubmitForm.item_type === 'command_bundle'" class="rounded-2xl border border-slate-200 p-4 dark:border-slate-700">
                            <div class="mb-3 flex items-center justify-between">
                                <div class="text-sm font-semibold text-slate-800 dark:text-slate-100">选择命令</div>
                                <button @click="loadMarketplaceCommandOptions"
                                        type="button"
                                        class="rounded-lg border border-slate-200 px-3 py-1.5 text-xs font-medium text-slate-600 transition hover:bg-slate-100 dark:border-slate-700 dark:text-slate-300 dark:hover:bg-slate-800">
                                    刷新命令
                                </button>
                            </div>
                            <div v-if="marketplaceCommandLoading" class="text-sm text-slate-500 dark:text-slate-400">命令列表加载中...</div>
                            <div v-else class="max-h-64 space-y-2 overflow-y-auto pr-1">
                                <label v-for="command in marketplaceCommandOptions" :key="command.id"
                                       class="flex items-start gap-3 rounded-xl border border-slate-200 px-3 py-2 text-sm dark:border-slate-700">
                                    <input v-model="marketplaceSubmitForm.selected_command_ids" :value="command.id" type="checkbox" class="mt-1">
                                    <div class="min-w-0">
                                        <div class="font-medium text-slate-800 dark:text-slate-100">{{ command.name }}</div>
                                        <div class="mt-1 text-xs text-slate-500 dark:text-slate-400">{{ command.group_name || '未分组' }}</div>
                                    </div>
                                </label>
                            </div>
                        </div>
                    </div>

                    <div class="rounded-2xl border border-slate-200 bg-slate-50/80 p-4 dark:border-slate-700 dark:bg-slate-950/60">
                        <div class="mb-3 flex items-center justify-between">
                            <div>
                                <h4 class="text-base font-semibold text-slate-900 dark:text-white">投稿预览</h4>
                                <p class="mt-1 text-sm text-slate-500 dark:text-slate-400">别人看到的标题、简介与导入内容会从这里生成。</p>
                            </div>
                            <button @click="showMarketplacePreview = true; marketplacePreviewTitle = '投稿预览'; marketplacePreviewData = JSON.parse(getMarketplaceSubmissionPreviewText().startsWith('//') ? '{}' : getMarketplaceSubmissionPreviewText())"
                                    type="button"
                                    class="rounded-lg border border-slate-200 px-3 py-1.5 text-xs font-medium text-slate-600 transition hover:bg-slate-100 dark:border-slate-700 dark:text-slate-300 dark:hover:bg-slate-800">
                                独立预览
                            </button>
                        </div>
                        <pre class="max-h-[28rem] overflow-auto rounded-xl bg-slate-950 p-4 text-xs leading-6 text-slate-100">{{ getMarketplaceSubmissionPreviewText() }}</pre>
                    </div>
                </div>
                <div class="flex justify-end gap-3 border-t border-slate-200 px-6 py-4 dark:border-slate-700">
                    <button @click="showMarketplaceSubmitDialog = false"
                            class="rounded-xl border border-slate-200 px-4 py-2 text-sm font-medium text-slate-600 transition hover:bg-slate-100 dark:border-slate-700 dark:text-slate-300 dark:hover:bg-slate-800">
                        取消
                    </button>
                    <button @click="submitMarketplaceItem"
                            :disabled="marketplaceSubmitSaving"
                            class="rounded-xl bg-blue-600 px-4 py-2 text-sm font-semibold text-white transition hover:bg-blue-700 disabled:opacity-50">
                        {{ marketplaceSubmitSaving ? '提交中...' : '提交到本地市场' }}
                    </button>
                </div>
            </div>
        </div>

    </div>

    <!-- 加载组件 JS -->
    <script src="/static/vendor/tailwindcss.js?v=2.6.7"></script>
    <script>
        window.tailwind = window.tailwind || {};
        window.tailwind.config = { darkMode: 'class' };
    </script>
    <script src="/static/vendor/vue.global.prod.js?v=2.6.7"></script>
    <script src="/static/js/icons.js?v=2.6.9"></script>
    <script src="/static/js/components/Sidebar.js?v=2.6.7"></script>
    <!-- 子组件（在 ConfigTab 之前） -->
    <script src="static/js/components/panels/SelectorPanel.js?v=2.6.7"></script>
    <script src="static/js/components/panels/ImageConfigPanel.js?v=2.6.7"></script>
    <script src="static/js/components/panels/StreamConfigPanel.js?v=2.6.7"></script>
    <script src="static/js/components/panels/WorkflowPanel.js?v=2.6.7"></script>
    <script src="static/js/components/panels/FilePastePanel.js?v=2.6.7"></script>

    <!-- 主组件 -->
    <script src="static/js/components/ConfigTab.js?v=2.6.7"></script>
    <script src="/static/js/components/MarketplaceTab.js?v=2.6.9"></script>
    <script src="/static/js/components/LogsTab.js?v=2.6.7"></script>
    <script src="/static/js/components/SettingsTab.js?v=2.6.7"></script>
    <script src="/static/js/components/Dialogs.js?v=2.6.8"></script>
    <script src="/static/js/components/TabPoolTab.js?v=2.6.7"></script>
    <script src="/static/js/components/commands/CommandsTabComputed.js?v=2.6.7"></script>
    <script src="/static/js/components/commands/CommandsTabMethods.js?v=2.6.7"></script>
    <script src="/static/js/components/commands/CommandsTabTemplate.js?v=2.6.7"></script>
    <script src="/static/js/components/CommandsTab.js?v=2.6.7"></script>

    <!-- 主应用逻辑 -->
    <script src="/static/js/dashboard.js?v=2.6.9"></script>
</body>
</html>
